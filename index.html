  function getColor(risk) {
    if (risk === "Critical") return "#d73027";
    if (risk === "High")     return "#fc8d59";
    if (risk === "Medium")   return "#fee08b";
    return "#91cf60";
  }

  // Scaled radius: max 25km, min 5km
  // Log scale so large values don't dwarf small ones
  function getRadius(events) {
    var e = parseInt(events) || 0;
    if (e === 0) return 5000;
    var scaled = Math.log(e + 1) / Math.log(600) * 25000;
    return Math.max(Math.min(scaled, 25000), 5000);
  }

  var map = L.map("map").setView([17.0, -2.5], 6);

  L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", {
    attribution: "© OpenStreetMap contributors",
    maxZoom: 18
  }).addTo(map);

  mapData.forEach(function(d) {
    if (!d.lat || !d.lng) return;
    var circle = L.circle([d.lat, d.lng], {
      radius: getRadius(d.events),
      fillColor: getColor(d.risk),
      color: "white",
      weight: 1.5,
      fillOpacity: 0.78
    });
    circle.bindPopup(
      "<b style=\"font-size:14px\">" + d.cercle + "</b>" +
      "<hr style=\"margin:4px 0\">" +
      "<b>Region:</b> " + d.region + "<br>" +
      "<b>EDI Score:</b> " + d.edi + "<br>" +
      "<b>Risk Level:</b> <span style=\"color:" + getColor(d.risk) + ";font-weight:bold\">" + d.risk + "</span><br>" +
      "<b>Conflict Events (2020-24):</b> " + d.events + "<br>" +
      "<b>Population:</b> " + parseInt(d.pop).toLocaleString() + "<br>" +
      "<b>Schools Closed:</b> " + d.closed + " of " + d.schools +
      " (" + d.pct_closed + "%)"
    );
    circle.addTo(map);
  });

  // Title
  var titleBox = L.control({position: "topleft"});
  titleBox.onAdd = function() {
    var div = L.DomUtil.create("div", "info-box");
    div.innerHTML =

      "<p>Conflict exposure vs. school functionality | 2020–2024<br>" +
      "Sources: ACLED, OCHA Mali, HDX<br>" +
      "Circle size = conflict volume (log scale)" +
      "<div class=\"data-note\">⚠ School data matched for 27 of 50 cercles.<br>Remaining cercles scored on conflict only.</div></p>";
    return div;
  };
  titleBox.addTo(map);

  // Legend
  var legend = L.control({position: "bottomright"});
  legend.onAdd = function() {

    div.innerHTML =

      "<i style=\"background:#d73027\"></i> Critical (EDI &ge; 0.7)<br>" +

      "<i style=\"background:#91cf60\"></i> Low &nbsp;&nbsp;&nbsp;&nbsp;(EDI &lt; 0.2)";
    return div;
